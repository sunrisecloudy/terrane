# XcodeGen spec — generates Terrane.xcodeproj (gitignored; regenerate with
# `xcodegen generate`). The macOS host: an AppKit + WKWebView app that links the
# Rust staticlib libterrane_ffi.a (built by the pre-build phase below).
name: Terrane
options:
  bundleIdPrefix: com.terrane
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  TerraneHost:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.terrane.host
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../terrane-core/target/release
        OTHER_LDFLAGS:
          - $(inherited)
          - -lterrane_ffi
        SWIFT_OBJC_BRIDGING_HEADER: Sources/TerraneHost-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../terrane-core/crates/terrane-ffi/include
    info:
      path: Sources/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        CFBundleName: Terrane
        LSUIElement: false
    dependencies:
      - sdk: WebKit.framework
      - sdk: AppKit.framework
    preBuildScripts:
      - name: "Build terrane-ffi (Rust staticlib)"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../../terrane-core"
          cargo build -p terrane-ffi --release
