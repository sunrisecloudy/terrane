# XcodeGen spec — generates Terrane.xcodeproj (gitignored; regenerate with
# `xcodegen generate`). The macOS host: an AppKit + WKWebView app that links the
# Rust staticlib libterrane_host.a (built by the pre-build phase below).
name: Terrane
options:
  bundleIdPrefix: com.terrane
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  TerraneHost:
    type: application
    platform: macOS
    supportedDestinations:
      - macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.terrane.host
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../rust/target/release
        OTHER_LDFLAGS:
          - $(inherited)
          - -lterrane_host
        SWIFT_OBJC_BRIDGING_HEADER: Sources/TerraneHost-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../rust/crates/terrane-host/include
    info:
      path: Sources/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSCameraUsageDescription: "Photobooth uses the camera only when you start the camera and take a picture."
        CFBundleName: Terrane
        LSUIElement: false
    dependencies:
      - sdk: WebKit.framework
      - sdk: AppKit.framework
    preBuildScripts:
      - name: "Build terrane-host (Rust staticlib)"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../../rust"
          cargo build -p terrane-host --release
  TerraneHostE2ETests:
    type: bundle.unit-test
    platform: macOS
    supportedDestinations:
      - macOS
    sources:
      - path: Tests
      - path: Sources/AppCatalog.swift
      - path: Sources/AppSchemeHandler.swift
      - path: Sources/HomePage.swift
      - path: Sources/TerraneBridge.swift
      - path: Sources/PreviewSchemeHandler.swift
      - path: Sources/AppSidebarView.swift
      - path: Sources/LocalModelPanel.swift
      - path: Sources/SourceEditor.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.terrane.host.e2e-tests
        GENERATE_INFOPLIST_FILE: "YES"
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../rust/target/release
        OTHER_LDFLAGS:
          - $(inherited)
          - -lterrane_host
        SWIFT_OBJC_BRIDGING_HEADER: Sources/TerraneHost-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../../rust/crates/terrane-host/include
    dependencies:
      - sdk: WebKit.framework
      - sdk: AppKit.framework
    preBuildScripts:
      - name: "Build terrane-host (Rust staticlib)"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../../rust"
          cargo build -p terrane-host --release
schemes:
  TerraneHost:
    build:
      targets:
        TerraneHost: all
    run:
      config: Debug
      executable: TerraneHost
    profile:
      config: Release
      executable: TerraneHost
    analyze:
      config: Debug
    archive:
      config: Release
  TerraneHostE2ETests:
    build:
      targets:
        TerraneHostE2ETests: all
    test:
      config: Debug
      targets:
        - TerraneHostE2ETests
