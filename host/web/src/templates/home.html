<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terrane</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: Canvas;
        color: CanvasText;
      }
      .page {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 24px 48px;
      }
      .hero {
        padding: 72px 0 40px;
        text-align: center;
      }
      .hero h1 {
        margin: 0;
        font-size: 40px;
        letter-spacing: -0.5px;
      }
      .hero p {
        margin: 12px auto 0;
        max-width: 480px;
        font-size: 16px;
        line-height: 1.5;
        color: color-mix(in srgb, CanvasText 66%, transparent);
      }
      .section-title {
        margin: 32px 0 12px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: color-mix(in srgb, CanvasText 55%, transparent);
      }
      .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .app-card {
        display: block;
        padding: 16px;
        border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
        border-radius: 10px;
        background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
        color: inherit;
        text-decoration: none;
        min-width: 0;
      }
      .app-card span {
        display: block;
        font-size: 15px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .app-card small {
        display: block;
        margin-top: 4px;
        color: color-mix(in srgb, CanvasText 55%, transparent);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      a.app-card:hover {
        border-color: #0071e3;
        background: color-mix(in srgb, #0071e3 10%, Canvas);
      }
      .app-card.disabled {
        opacity: 0.55;
      }
      .app-empty,
      .app-error {
        grid-column: 1 / -1;
        padding: 24px;
        border: 1px dashed color-mix(in srgb, CanvasText 22%, transparent);
        border-radius: 10px;
        text-align: center;
        color: color-mix(in srgb, CanvasText 62%, transparent);
      }
      .footer {
        margin-top: 48px;
        padding-top: 16px;
        border-top: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: color-mix(in srgb, CanvasText 55%, transparent);
      }
      .footer a {
        color: #0071e3;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>Terrane</h1>
        <p>
          Your local apps, served from your own home. Pick an app below to
          open it.
        </p>
      </header>
      <main>
        <h2 class="section-title">Apps</h2>
        <div id="home-app-list" class="app-grid" aria-live="polite">
          <div class="app-empty">Loading apps...</div>
        </div>
      </main>
      <footer class="footer">
        <span>Terrane web host</span>
        <a href="/__terrane/admin">Admin console</a>
      </footer>
    </div>
    <script>
      __HOME_JS__;
    </script>
  </body>
</html>
