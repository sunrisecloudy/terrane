<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terrane Admin</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    body {
      margin: 0;
      min-height: 100vh;
    }
    button {
      font: inherit;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      background: color-mix(in srgb, Canvas 92%, CanvasText 8%);
      color: CanvasText;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }
    button.primary {
      background: #0071e3;
      border-color: #0071e3;
      color: white;
    }
    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    input, select {
      font: inherit;
      min-width: 0;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 6px;
      padding: 6px 8px;
      background: Canvas;
      color: CanvasText;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: color-mix(in srgb, CanvasText 66%, transparent);
    }
    .shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: 100vh;
    }
    nav {
      border-right: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      padding: 16px;
      background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
    }
    nav h1 {
      font-size: 18px;
      margin: 0 0 18px;
      letter-spacing: 0;
    }
    nav button {
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
    }
    nav button.active {
      background: #0071e3;
      border-color: #0071e3;
      color: white;
    }
    main {
      min-width: 0;
      padding: 18px 22px 28px;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
    }
    .authority {
      font-size: 13px;
      color: color-mix(in srgb, CanvasText 70%, transparent);
    }
    .bar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    h2 {
      font-size: 20px;
      margin: 0 0 14px;
      letter-spacing: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 10%, transparent);
      padding: 10px 8px;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      color: color-mix(in srgb, CanvasText 62%, transparent);
    }
    .tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .form-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) minmax(120px, 160px) auto;
      align-items: end;
      gap: 10px;
      margin-bottom: 16px;
    }
    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }
    .checks label {
      display: flex;
      grid-template-columns: none;
      align-items: center;
      gap: 5px;
    }
    .token {
      border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      white-space: nowrap;
    }
    .token.missing {
      border-color: #b44;
      color: #b44;
    }
    .muted {
      color: color-mix(in srgb, CanvasText 62%, transparent);
    }
    @media (max-width: 760px) {
      .shell {
        grid-template-columns: 1fr;
      }
      nav {
        border-right: 0;
        border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      }
      nav button {
        width: auto;
        margin-right: 8px;
      }
      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav>
      <h1>Terrane Admin</h1>
      <button data-view="apps" class="active">Apps</button>
      <button data-view="grants">Grants</button>
      <button data-view="agents">Agents</button>
      <button data-view="requests">Requests</button>
    </nav>
    <main>
      <div class="bar">
        <div>
          <h2 id="view-title">Apps</h2>
          <div id="authority" class="authority">local / user:local-owner / local</div>
        </div>
        <div class="bar-actions">
          <button id="refresh">Refresh</button>
          <button id="lock-toggle">Lock</button>
        </div>
      </div>
      <section id="content"></section>
    </main>
  </div>
  <script>
__ADMIN_JS__
  </script>
</body>
</html>
