# Standalone workspace: host/web is its own Cargo workspace (separate Cargo.lock
# and target/) like the other hosts. It path-depends across the boundary into
# terrane-core's crates and serves apps over HTTP with tiny_http (blocking,
# single-threaded — which suits the non-Send Core).
[workspace]

[package]
name = "terrane-host-web"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[[bin]]
name = "terrane-web"
path = "src/main.rs"

[dependencies]
terrane-api = { path = "../../terrane-core/crates/terrane-api" }
terrane-host = { path = "../../terrane-core/crates/terrane-host" }
nanoserde = { version = "0.2", default-features = false, features = ["json"] }
tiny_http = "0.12"

[dev-dependencies]
tempfile = "3"
terrane-core = { path = "../../terrane-core/crates/terrane-core" }
terrane-domain = { path = "../../terrane-core/crates/terrane-domain" }
