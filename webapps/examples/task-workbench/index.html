<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">

  <title>Task Workbench</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <span class="badge">Core + Storage</span>
      <h1 data-testid="task-workbench-title">Task Workbench</h1>
      <p>Creates tasks through <code>core.step</code>, persists them through the storage bridge, and shows validation state.</p>
    </header>
    <section class="composer">
      <input id="title" data-testid="task-title-input" aria-label="Task title" placeholder="Task title" maxlength="120">
      <select id="priority" data-testid="task-priority-select" aria-label="Priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button id="add" data-testid="add-task-button" class="primary">Add task</button>
    </section>
    <section class="filters">
      <button data-filter="all" data-testid="filter-all-button" class="active">All</button>
      <button data-filter="open" data-testid="filter-open-button">Open</button>
      <button data-filter="done" data-testid="filter-done-button">Done</button>
      <button data-filter="high" data-testid="filter-high-button">High priority</button>
    </section>
    <section class="board">
      <div id="empty" class="empty">No tasks. Add a task to test core.step.</div>
      <ul id="tasks"></ul>
    </section>
    <section class="panel">
      <h2>Last core response</h2>
      <pre id="core-output">Waiting for event…</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
