<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">

  <title>API Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header><span>Network bridge</span><h1 data-testid="api-dashboard-title">API Dashboard</h1><p>Calls network.request through the host, records history, and renders response metrics.</p></header>
    <section class="request">
      <input id="url" data-testid="api-url-input" value="https://api.example.test/status" aria-label="URL">
      <select id="method" data-testid="api-method-select"><option>GET</option><option>POST</option></select>
      <button id="send" data-testid="refresh-status-button" class="primary">Send</button>
    </section>
    <section class="metrics">
      <div><b id="status" data-testid="api-status-value">—</b><small>Status</small></div>
      <div><b id="bytes" data-testid="api-bytes-value">—</b><small>Bytes</small></div>
      <div><b id="duration" data-testid="api-duration-value">—</b><small>Duration</small></div>
    </section>
    <section class="panel"><h2>Response preview</h2><pre id="response">No response yet.</pre></section>
    <section class="panel"><h2>History</h2><div id="history" class="history"></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
