<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">

  <title>Core Replay Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header><span>Zig core</span><h1 data-testid="core-replay-title">Core Replay Lab</h1><p>Build event fixtures, replay them through core.step, and export JSON.</p></header>
    <section class="grid">
      <div class="panel">
        <h2>Event</h2>
        <select id="event-type" data-testid="event-type-select"><option>CreateTask</option><option>TransformText</option><option>NetworkSnapshotReceived</option><option>CustomEvent</option></select>
        <textarea id="payload" data-testid="event-payload-input" rows="10">{"title":"Demo task","priority":"medium"}</textarea>
        <div class="row"><button id="send" data-testid="send-event-button" class="primary">Send event</button><button id="replay" data-testid="replay-events-button">Replay all</button><button id="clear" data-testid="clear-events-button">Clear</button></div>
      </div>
      <div class="panel">
        <h2>Core output</h2>
        <pre id="output">No output yet.</pre>
      </div>
    </section>
    <section class="panel"><div class="row between"><h2>Event log</h2><button id="export" data-testid="export-fixture-button">Export fixture</button></div><ol id="log"></ol></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
