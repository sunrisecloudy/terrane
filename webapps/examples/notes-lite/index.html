<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">

  <title>Notes Lite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Generated app example</p>
        <h1 data-testid="notes-title">Notes Lite</h1>
        <p class="muted">Storage bridge CRUD, search, and toast coverage.</p>
      </div>
      <button id="new-note" data-testid="new-note-button" class="primary">New note</button>
    </header>

    <section class="panel editor" id="editor" hidden>
      <label>Title <input id="note-title" data-testid="note-title-input" maxlength="80" autocomplete="off"></label>
      <label>Body <textarea id="note-body" data-testid="note-body-input" rows="5"></textarea></label>
      <div class="row">
        <button id="save-note" data-testid="save-note-button" class="primary">Save</button>
        <button id="cancel-edit" data-testid="cancel-edit-button">Cancel</button>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="search" data-testid="notes-search-input" aria-label="Search notes" placeholder="Search notes" autocomplete="off">
        <button id="clear-all" data-testid="clear-all-notes-button" class="danger">Clear all</button>
      </div>
      <div id="empty" class="empty">No notes yet. Create one to test storage.set.</div>
      <ul id="notes" class="notes"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
