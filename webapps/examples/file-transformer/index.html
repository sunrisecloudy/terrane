<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">

  <title>File Transformer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="hero"><div><b>Dialog + Core</b><h1 data-testid="file-transformer-title">File Transformer</h1><p>Open text, choose a transform, route through core.step, then save.</p></div></header>
    <section class="actions">
      <button id="open" data-testid="open-file-button" class="primary">Open text file</button>
      <select id="mode" data-testid="transform-mode-select"><option value="uppercase">Uppercase</option><option value="lowercase">Lowercase</option><option value="reverse-lines">Reverse lines</option><option value="word-count">Word count report</option></select>
      <button id="transform" data-testid="transform-button">Transform with core</button>
      <button id="save" data-testid="save-file-button">Save output</button>
    </section>
    <section class="grid">
      <label>Input<textarea id="input" data-testid="file-input-textarea" rows="14" placeholder="Open a file or paste text here"></textarea></label>
      <label>Output<textarea id="output" data-testid="file-output-textarea" rows="14" readonly></textarea></label>
    </section>
    <section class="panel"><h2>Status</h2><pre id="status">Ready</pre></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
