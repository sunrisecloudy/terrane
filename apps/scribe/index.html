<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scribe</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 14px -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        background: Canvas;
        color: CanvasText;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      h1 {
        font-size: 18px;
        margin: 0;
        flex: 1;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: #8882;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8888;
      }
      .live .dot {
        background: #ff3b30;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      button {
        font: inherit;
        padding: 6px 12px;
        border: 1px solid #8886;
        border-radius: 8px;
        background: Field;
        color: FieldText;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      button.primary {
        background: #0071e3;
        color: #fff;
        border-color: #0071e3;
      }
      .hint {
        font-size: 12px;
        color: #8888;
      }
      .transcript {
        min-height: 120px;
        max-height: 320px;
        overflow-y: auto;
        padding: 12px;
        background: #8881;
        border-radius: 10px;
        line-height: 1.6;
      }
      .seg {
        cursor: pointer;
        padding: 1px 2px;
        border-radius: 4px;
      }
      .seg.selected {
        background: #0071e334;
      }
      .seg.anchor {
        background: #0071e368;
      }
      .empty {
        color: #8888;
        font-style: italic;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px;
        background: #8881;
        border-radius: 10px;
      }
      .preview {
        flex: 1;
        min-width: 200px;
        color: CanvasText;
      }
      .log {
        font-size: 12px;
        color: #8888;
        max-height: 80px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Scribe</h1>
      <span id="status" class="status"><span class="dot"></span><span id="statusText">idle</span></span>
      <button id="stop" disabled>Stop</button>
    </header>
    <p class="hint" id="captureHint" hidden></p>

    <section>
      <div class="hint" style="margin-bottom:6px">Transcript — click a segment to mark the start, shift-click another for the end.</div>
      <div id="transcript" class="transcript"></div>
    </section>

    <section id="selectBar" class="bar" hidden>
      <span class="preview" id="preview"></span>
      <button class="primary" data-sink="clipboard">Copy</button>
      <button data-sink="note">Save note</button>
      <button data-sink="field">Send to field</button>
      <button id="clear">Clear</button>
    </section>

    <div id="log" class="log"></div>

    <script>
      var sttSessionId = null;
      var sttStatus = "idle"; // idle | open | closed
      var anchorSeq = null;   // first-clicked segment seq
      var fromSeq = null;
      var toSeq = null;

      var transcriptEl = document.getElementById("transcript");
      var statusEl = document.getElementById("status");
      var statusTextEl = document.getElementById("statusText");
      var stopBtn = document.getElementById("stop");
      var selectBar = document.getElementById("selectBar");
      var previewEl = document.getElementById("preview");
      var clearBtn = document.getElementById("clear");
      var logEl = document.getElementById("log");
      var captureHint = document.getElementById("captureHint");

      function invoke() {
        if (!window.terrane || typeof window.terrane.invoke !== "function") {
          return Promise.reject(new Error("Terrane bridge unavailable"));
        }
        return window.terrane.invoke.apply(window.terrane, arguments);
      }

      function log(msg) {
        var line = document.createElement("div");
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(s, sessionId) {
        sttStatus = s;
        sttSessionId = sessionId || sttSessionId;
        if (s === "open") {
          statusEl.classList.add("live");
          statusTextEl.textContent = "listening";
          stopBtn.disabled = false;
          captureHint.hidden = true;
        } else if (s === "closed") {
          statusEl.classList.remove("live");
          statusTextEl.textContent = "stopped";
          stopBtn.disabled = true;
        } else {
          statusEl.classList.remove("live");
          statusTextEl.textContent = "idle";
          stopBtn.disabled = true;
          captureHint.hidden = false;
          captureHint.textContent =
            "No live session. Capture is started by the host (mic consent) — see Phase 2.";
        }
      }

      function clearSelection() {
        anchorSeq = fromSeq = toSeq = null;
        selectBar.hidden = true;
        Array.prototype.forEach.call(transcriptEl.querySelectorAll(".seg"), function (el) {
          el.classList.remove("selected", "anchor");
        });
      }

      function highlightRange(segs, from, to) {
        segs.forEach(function (seg) {
          var el = transcriptEl.querySelector('[data-seq="' + seg.seq + '"]');
          if (!el) return;
          el.classList.remove("selected", "anchor");
          if (seg.seq >= from && seg.seq <= to) el.classList.add("selected");
        });
      }

      function render(state) {
        setStatus(state.session ? state.session.status : "idle", state.sessionId);
        transcriptEl.textContent = "";
        var segs = state.segments || [];
        if (segs.length === 0) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent =
            sttStatus === "open" ? "Listening…" : "No transcript yet.";
          transcriptEl.appendChild(empty);
          return;
        }
        segs.forEach(function (seg) {
          var span = document.createElement("span");
          span.className = "seg";
          span.dataset.seq = String(seg.seq);
          span.textContent = seg.text + " ";
          span.title = "#" + seg.seq + "  " + seg.startMs + "–" + seg.endMs + "ms";
          span.addEventListener("click", function (e) {
            onSegmentClick(seg.seq, e.shiftKey, segs);
          });
          transcriptEl.appendChild(span);
        });
        if (fromSeq != null && toSeq != null) highlightRange(segs, fromSeq, toSeq);
      }

      function onSegmentClick(seq, shift, segs) {
        if (!shift || anchorSeq == null) {
          anchorSeq = seq;
          fromSeq = toSeq = seq;
        } else {
          fromSeq = Math.min(anchorSeq, seq);
          toSeq = Math.max(anchorSeq, seq);
        }
        clearSelection();
        highlightRange(segs, fromSeq, toSeq);
        var anchorEl = transcriptEl.querySelector('[data-seq="' + anchorSeq + '"]');
        if (anchorEl) anchorEl.classList.add("anchor");
        showPreview();
      }

      function showPreview() {
        if (fromSeq == null || toSeq == null || !sttSessionId) {
          selectBar.hidden = true;
          return;
        }
        invoke("transcript", sttSessionId)
          .then(function (text) {
            // Preview the joined text of the selected range only.
            return invoke("segments", sttSessionId).then(function (json) {
              var segs = JSON.parse(json || "[]");
              var picked = segs
                .filter(function (s) {
                  return s.seq >= fromSeq && s.seq <= toSeq;
                })
                .map(function (s) {
                  return s.text;
                })
                .join(" ");
              previewEl.textContent = "[" + fromSeq + "…" + toSeq + "] " + picked;
              selectBar.hidden = false;
            });
          })
          .catch(showError);
      }

      function sendSelection(sink) {
        if (!sttSessionId || fromSeq == null || toSeq == null) return;
        invoke("select", sttSessionId, String(fromSeq), String(toSeq), sink)
          .then(function (text) {
            log("→ " + sink + ": " + text);
            clearSelection();
            refresh();
          })
          .catch(showError);
      }

      function showError(error) {
        log((error && error.message) || String(error));
      }

      function refresh() {
        return invoke("state")
          .then(function (json) {
            render(JSON.parse(json || "{}"));
          })
          .catch(showError);
      }

      stopBtn.addEventListener("click", function () {
        if (!sttSessionId) return;
        invoke("stop", sttSessionId)
          .then(function () {
            return refresh();
          })
          .catch(showError);
      });

      clearBtn.addEventListener("click", clearSelection);

      Array.prototype.forEach.call(
        document.querySelectorAll("#selectBar button[data-sink]"),
        function (btn) {
          btn.addEventListener("click", function () {
            sendSelection(btn.dataset.sink);
          });
        }
      );

      // Poll the folded transcript ~3×/s. Segments arrive as recorded events;
      // the app never touches audio.
      refresh();
      setInterval(refresh, 350);
    </script>
  </body>
</html>
