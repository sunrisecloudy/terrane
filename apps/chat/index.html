<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 14px -apple-system, system-ui, sans-serif;
        margin: 0;
        background: Canvas;
        color: CanvasText;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #8883;
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 16px;
        margin: 0 8px 0 0;
      }
      select, input[type="text"] {
        padding: 6px 8px;
        border: 1px solid #8884;
        border-radius: 8px;
        font: inherit;
        background: Field;
        color: FieldText;
      }
      button {
        padding: 6px 12px;
        border: 0;
        border-radius: 8px;
        background: #0071e3;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      button.secondary {
        background: #8883;
        color: CanvasText;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #pull-row {
        display: none;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid #8883;
        align-items: center;
        flex-wrap: wrap;
      }
      #pull-row.open { display: flex; }
      #pull-row input { min-width: 220px; }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 72%;
        padding: 9px 13px;
        border-radius: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
      }
      .msg.user {
        align-self: flex-end;
        background: #0071e3;
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #8882;
        border-bottom-left-radius: 4px;
      }
      .msg .tag {
        display: block;
        font-size: 11px;
        opacity: 0.6;
        margin-top: 5px;
      }
      #empty {
        opacity: 0.55;
        text-align: center;
        margin: auto;
      }
      #status {
        font-size: 12px;
        opacity: 0.7;
        min-height: 15px;
        padding: 0 16px 4px;
      }
      #status.error { color: #d33; opacity: 1; }
      footer {
        display: flex;
        gap: 8px;
        padding: 12px 16px 16px;
        border-top: 1px solid #8883;
      }
      footer input { flex: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1>Chat</h1>
      <select id="model" title="Model to chat with"></select>
      <button id="pull-toggle" class="secondary" title="Download a model from Hugging Face">Add model…</button>
      <button id="new" class="secondary" title="Start a fresh conversation">New chat</button>
    </header>
    <div id="pull-row">
      <input type="text" id="pull-repo" placeholder="Hugging Face repo (org/name)">
      <input type="text" id="pull-file" placeholder=".gguf file (empty = MLX repo)">
      <button id="pull">Download &amp; register</button>
      <span>Blocks until the download finishes.</span>
    </div>
    <div id="log"><p id="empty">Pick a model and say something.</p></div>
    <div id="status"></div>
    <footer>
      <input type="text" id="text" placeholder="Message the model…" autofocus>
      <button id="send">Send</button>
    </footer>
    <script>
      var logEl = document.getElementById("log");
      var emptyEl = document.getElementById("empty");
      var textEl = document.getElementById("text");
      var sendEl = document.getElementById("send");
      var modelEl = document.getElementById("model");
      var statusEl = document.getElementById("status");
      var pullRowEl = document.getElementById("pull-row");
      var pullRepoEl = document.getElementById("pull-repo");
      var pullFileEl = document.getElementById("pull-file");
      var pullEl = document.getElementById("pull");

      function invoke() {
        if (!window.terrane || typeof window.terrane.invoke !== "function") {
          return Promise.reject(new Error("Terrane bridge unavailable"));
        }
        return window.terrane.invoke.apply(window.terrane, arguments);
      }

      function status(text, isError) {
        statusEl.textContent = text || "";
        statusEl.className = isError ? "error" : "";
      }

      function showError(err) {
        status(String(err && err.message ? err.message : err), true);
      }

      function busy(on, text) {
        sendEl.disabled = on;
        pullEl.disabled = on;
        status(on ? text : "");
      }

      function renderModels(models, selected) {
        modelEl.textContent = "";
        var def = document.createElement("option");
        def.value = "";
        var defaultModel = models.filter(function (m) { return m.default; })[0];
        def.textContent = defaultModel
          ? "Default (" + defaultModel.id + ")"
          : (models.length ? "Default" : "No models — add one");
        modelEl.appendChild(def);
        models.forEach(function (m) {
          var opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.id + " · " + m.backend;
          modelEl.appendChild(opt);
        });
        modelEl.value = selected || "";
      }

      function renderMessages(messages) {
        logEl.textContent = "";
        if (!messages.length) {
          logEl.appendChild(emptyEl);
          emptyEl.hidden = false;
          return;
        }
        messages.forEach(function (m) {
          var div = document.createElement("div");
          div.className = "msg " + (m.role === "user" ? "user" : "assistant");
          div.textContent = m.text;
          if (m.role === "assistant" && m.model) {
            var tag = document.createElement("span");
            tag.className = "tag";
            tag.textContent = m.model;
            div.appendChild(tag);
          }
          logEl.appendChild(div);
        });
        logEl.scrollTop = logEl.scrollHeight;
      }

      function refresh() {
        return invoke("state").then(function (json) {
          var state = JSON.parse(json);
          renderModels(state.models || [], state.selected);
          renderMessages(state.messages || []);
        }).catch(showError);
      }

      function send() {
        var text = textEl.value.trim();
        if (!text) return;
        textEl.value = "";
        busy(true, "Thinking…");
        invoke("send", text).then(function (json) {
          var out = JSON.parse(json);
          if (!out.ok) throw new Error(out.error || "send failed");
        }).then(refresh).catch(showError).then(function () { busy(false); textEl.focus(); });
      }

      sendEl.addEventListener("click", send);
      textEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter") send();
      });

      modelEl.addEventListener("change", function () {
        invoke("use", modelEl.value).then(function (json) {
          var out = JSON.parse(json);
          if (!out.ok) throw new Error(out.error || "model switch failed");
        }).then(refresh).catch(showError);
      });

      document.getElementById("pull-toggle").addEventListener("click", function () {
        pullRowEl.classList.toggle("open");
        if (pullRowEl.classList.contains("open")) pullRepoEl.focus();
      });

      pullEl.addEventListener("click", function () {
        var repo = pullRepoEl.value.trim();
        if (!repo) { showError("enter a Hugging Face repo (org/name)"); return; }
        var file = pullFileEl.value.trim();
        busy(true, "Downloading " + repo + "… (may take minutes)");
        (file ? invoke("pull", repo, file) : invoke("pull", repo)).then(function (json) {
          var out = JSON.parse(json);
          if (!out.ok) throw new Error(out.error || "pull failed");
          pullRowEl.classList.remove("open");
          pullRepoEl.value = "";
          pullFileEl.value = "";
          status("Registered " + out.model);
        }).then(refresh).catch(showError).then(function () { busy(false); });
      });

      document.getElementById("new").addEventListener("click", function () {
        busy(true, "Starting a new conversation…");
        invoke("new").then(refresh).catch(showError).then(function () { busy(false); });
      });

      refresh();
    </script>
  </body>
</html>
