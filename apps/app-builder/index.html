<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App Builder</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="builder">
      <section class="hero">
        <div>
          <h1 data-i18n="app-builder.heading">App Builder</h1>
        </div>
        <button id="generate" type="button" data-i18n="app-builder.build">Build</button>
      </section>

      <section class="panel form" data-i18n-attr="aria-label:app-builder.formLabel" aria-label="App details">
        <label>
          <span data-i18n="app-builder.appId">App id</span>
          <input id="app-id" type="text" value="my-app" autocomplete="off">
        </label>
        <label>
          <span data-i18n="app-builder.name">Name</span>
          <input id="app-name" type="text" value="My App" autocomplete="off">
        </label>
        <label>
          <span data-i18n="app-builder.harness">Harness</span>
          <select id="harness">
            <option value="codex" selected>Codex</option>
            <option value="claude-code">Claude Code</option>
            <option value="opencode">OpenCode</option>
          </select>
        </label>
        <label class="wide">
          <span data-i18n="app-builder.prompt">Prompt</span>
          <textarea id="prompt" rows="5"
          >A local-first notes app with a simple list, saved notes, and a clean keyboard-friendly interface.</textarea>
        </label>
      </section>

      <section class="workspace">
        <section class="panel output-panel">
          <div class="output-head">
            <h2 data-i18n="app-builder.generatedFiles">Generated files</h2>
            <span id="status" data-i18n="app-builder.ready">Ready</span>
          </div>
          <div id="files" class="files"></div>
        </section>

        <section class="panel preview-panel">
          <div class="output-head">
            <h2 data-i18n="app-builder.preview">Preview</h2>
            <span id="preview-status" data-i18n="app-builder.waiting">Waiting</span>
          </div>
          <iframe id="preview-frame" data-i18n-attr="title:app-builder.previewTitle" title="Generated app preview"></iframe>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
