<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photobooth</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink: CanvasText;
        --muted: color-mix(in srgb, CanvasText 62%, transparent);
        --line: color-mix(in srgb, CanvasText 14%, transparent);
        --accent: #0f7b6c;
        --accent-strong: #1057c8;
        --warm: #b15f2d;
        --surface: color-mix(in srgb, Canvas 92%, CanvasText 8%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(135deg, color-mix(in srgb, Canvas 94%, var(--accent) 6%), Canvas 42%),
          Canvas;
        color: var(--ink);
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) 280px;
        gap: 18px;
        width: min(1120px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 22px 0;
      }

      main {
        min-width: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
        font-weight: 700;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .stage {
        position: relative;
        overflow: hidden;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(45deg, #c8c8c8 25%, transparent 25%),
          linear-gradient(-45deg, #c8c8c8 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #c8c8c8 75%),
          linear-gradient(-45deg, transparent 75%, #c8c8c8 75%),
          #f7f7f7;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
        background-size: 20px 20px;
      }

      video,
      canvas,
      .photo {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 420px;
        object-fit: cover;
        background: #111;
      }

      video {
        transform: scaleX(-1);
      }

      canvas {
        display: none;
      }

      .photo {
        display: none;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: color-mix(in srgb, #111 58%, transparent);
        text-align: center;
        font-size: 15px;
        background:
          radial-gradient(circle at 50% 42%, #ffffff 0 16%, transparent 17%),
          linear-gradient(120deg, #e8edf2, #f6efe8);
      }

      aside {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: color-mix(in srgb, Canvas 88%, CanvasText 4%);
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        text-transform: uppercase;
      }

      .controls,
      .download-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button,
      .download {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: ButtonFace;
        color: ButtonText;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        border-color: transparent;
        background: var(--accent-strong);
        color: #fff;
      }

      .capture {
        background: var(--accent);
      }

      .warm {
        background: color-mix(in srgb, var(--warm) 14%, ButtonFace);
      }

      button:disabled,
      .download[aria-disabled="true"] {
        opacity: 0.45;
        cursor: default;
        pointer-events: none;
      }

      .metric {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 0;
        border-top: 1px solid var(--line);
        color: var(--muted);
      }

      .metric:first-of-type {
        border-top: 0;
      }

      .metric strong {
        color: var(--ink);
        font-weight: 600;
      }

      @media (max-width: 780px) {
        .shell {
          grid-template-columns: 1fr;
          width: min(100vw - 24px, 720px);
          padding: 12px 0;
        }

        aside {
          order: -1;
        }

        header {
          align-items: start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main>
        <header>
          <h1 data-i18n="photobooth.heading">Photobooth</h1>
          <div id="status" class="status" data-i18n="photobooth.statusReady">Ready</div>
        </header>

        <section class="stage" data-i18n-attr="aria-label:photobooth.previewAria" aria-label="camera preview">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
          <img id="photo" class="photo" data-i18n-attr="alt:photobooth.photoAlt" alt="Captured photo">
          <div id="empty" class="empty" data-i18n="photobooth.cameraPreview">Camera preview</div>
        </section>
      </main>

      <aside>
        <section class="panel">
          <span class="label" data-i18n="photobooth.cameraLabel">Camera</span>
          <div class="controls">
            <button id="start" class="primary" type="button" data-i18n="photobooth.start">Start</button>
            <button id="capture" class="primary capture" type="button" disabled data-i18n="photobooth.takePhoto">Take Photo</button>
            <button id="retake" class="warm" type="button" disabled data-i18n="photobooth.retake">Retake</button>
          </div>
        </section>

        <section class="panel">
          <span class="label" data-i18n="photobooth.photoLabel">Photo</span>
          <div class="download-row">
            <a id="download" class="download" href="#" download="photobooth.png" aria-disabled="true" data-i18n="photobooth.downloadPng">Download PNG</a>
          </div>
        </section>

        <section class="panel">
          <span class="label" data-i18n="photobooth.sessionLabel">Session</span>
          <div class="metric">
            <span data-i18n="photobooth.cameraMetric">Camera</span>
            <strong id="camera-state" data-i18n="photobooth.cameraOff">Off</strong>
          </div>
          <div class="metric">
            <span data-i18n="photobooth.photoMetric">Photo</span>
            <strong id="photo-state" data-i18n="photobooth.photoNone">None</strong>
          </div>
          <div class="metric">
            <span data-i18n="photobooth.sizeMetric">Size</span>
            <strong id="size-state">-</strong>
          </div>
        </section>
      </aside>
    </div>

    <script>
      var stream = null;
      var startAttempt = 0;
      var photoBlobUrl = null;
      var video = document.getElementById("video");
      var canvas = document.getElementById("canvas");
      var photo = document.getElementById("photo");
      var empty = document.getElementById("empty");
      var startButton = document.getElementById("start");
      var captureButton = document.getElementById("capture");
      var retakeButton = document.getElementById("retake");
      var downloadLink = document.getElementById("download");
      var statusEl = document.getElementById("status");
      var cameraState = document.getElementById("camera-state");
      var photoState = document.getElementById("photo-state");
      var sizeState = document.getElementById("size-state");

      // Translate via the host bundle when present, else fall back to English.
      // The ~15-line localize() block below is the pattern every app copies.
      function tr(key, fallback, params) {
        if (window.terrane && typeof window.terrane.t === "function") {
          var opts = { default: fallback };
          if (params) {
            for (var k in params) {
              if (Object.prototype.hasOwnProperty.call(params, k)) opts[k] = params[k];
            }
          }
          return window.terrane.t(key, opts);
        }
        return fallback;
      }

      function localize() {
        document.documentElement.dir =
          (window.terrane && window.terrane.getDir && window.terrane.getDir()) || "ltr";
        var nodes = document.querySelectorAll("[data-i18n]");
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].textContent = tr(nodes[i].getAttribute("data-i18n"), nodes[i].textContent.trim());
        }
        var attrNodes = document.querySelectorAll("[data-i18n-attr]");
        for (var j = 0; j < attrNodes.length; j++) {
          attrNodes[j].getAttribute("data-i18n-attr").split(";").forEach(function (pair) {
            var kv = pair.split(":");
            if (kv.length === 2) {
              var attr = kv[0].trim();
              attrNodes[j].setAttribute(attr, tr(kv[1].trim(), attrNodes[j].getAttribute(attr)));
            }
          });
        }
        document.title = tr("photobooth.title", "Photobooth");
        // Re-render the live JS-driven strings for the current camera/photo state.
        setCameraReady(!captureButton.disabled);
        if (downloadLink.getAttribute("aria-disabled") === "false") {
          photoState.textContent = tr("photobooth.captured", "Captured");
        } else {
          photoState.textContent = tr("photobooth.photoNone", "None");
        }
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function revokePhotoBlob() {
        if (!photoBlobUrl) return;
        URL.revokeObjectURL(photoBlobUrl);
        photoBlobUrl = null;
      }

      function dataUrlToBlob(dataUrl) {
        var parts = dataUrl.split(",");
        var header = parts[0] || "";
        var mimeMatch = header.match(/data:([^;]+)/);
        var mime = mimeMatch ? mimeMatch[1] : "application/octet-stream";
        var binary = atob(parts[1] || "");
        var bytes = new Uint8Array(binary.length);
        for (var index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return new Blob([bytes], { type: mime });
      }

      function setPhoto(dataUrl, width, height) {
        revokePhotoBlob();
        photoBlobUrl = URL.createObjectURL(dataUrlToBlob(dataUrl));
        photo.src = dataUrl;
        photo.style.display = "block";
        video.style.display = "none";
        empty.style.display = "none";
        downloadLink.href = photoBlobUrl;
        downloadLink.setAttribute("aria-disabled", "false");
        retakeButton.disabled = false;
        photoState.textContent = tr("photobooth.captured", "Captured");
        sizeState.textContent = width + " x " + height;
      }

      function clearPhoto() {
        revokePhotoBlob();
        photo.removeAttribute("src");
        downloadLink.href = "#";
        downloadLink.setAttribute("aria-disabled", "true");
        photoState.textContent = tr("photobooth.photoNone", "None");
        sizeState.textContent = "-";
      }

      function showPreview() {
        photo.style.display = "none";
        video.style.display = stream ? "block" : "none";
        empty.style.display = stream ? "none" : "grid";
        retakeButton.disabled = true;
      }

      function hasLiveStream() {
        return !!stream && stream.getTracks().some(function (track) {
          return track.readyState === "live";
        });
      }

      function setCameraReady(ready) {
        captureButton.disabled = !ready;
        cameraState.textContent = ready
          ? tr("photobooth.cameraOn", "On")
          : tr("photobooth.cameraOff", "Off");
        startButton.textContent = ready
          ? tr("photobooth.reset", "Reset")
          : tr("photobooth.start", "Start");
        startButton.disabled = false;
      }

      function stopStream() {
        if (stream) {
          stream.getTracks().forEach(function (track) {
            track.stop();
          });
        }
        stream = null;
        video.pause();
        video.srcObject = null;
        video.removeAttribute("src");
        video.load();
        setCameraReady(false);
      }

      function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus(tr("photobooth.cameraUnavailable", "Camera API unavailable in this host"));
          return;
        }
        if (hasLiveStream()) {
          clearPhoto();
          setCameraReady(true);
          showPreview();
          setStatus(tr("photobooth.cameraReady", "Camera ready"));
          return;
        }
        var attempt = ++startAttempt;
        setStatus(tr("photobooth.openingCamera", "Opening camera..."));
        stopStream();
        startButton.disabled = true;
        captureButton.disabled = true;
        retakeButton.disabled = true;
        clearPhoto();
        showPreview();
        setTimeout(function () {
          var timeoutId = setTimeout(function () {
            if (attempt !== startAttempt || stream) return;
            startAttempt++;
            setCameraReady(false);
            showPreview();
            setStatus(tr("photobooth.cameraTimeout", "Camera request timed out. Try Start again."));
          }, 12000);

          navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1280 },
              height: { ideal: 960 },
              facingMode: "user"
            },
            audio: false
          }).then(function (mediaStream) {
            clearTimeout(timeoutId);
            if (attempt !== startAttempt) {
              mediaStream.getTracks().forEach(function (track) {
                track.stop();
              });
              return;
            }
            stream = mediaStream;
            video.srcObject = stream;
            var playPromise = video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(function (error) {
                if (attempt !== startAttempt) return;
                setStatus(error && error.message ? error.message : String(error));
              });
            }
            setCameraReady(true);
            showPreview();
            setStatus(tr("photobooth.cameraReady", "Camera ready"));
          }).catch(function (error) {
            clearTimeout(timeoutId);
            if (attempt !== startAttempt) return;
            setCameraReady(false);
            showPreview();
            setStatus(error && error.message ? error.message : String(error));
          });
        }, 180);
      }

      function capturePhoto() {
        if (!stream || !video.videoWidth || !video.videoHeight) return;
        var width = video.videoWidth;
        var height = video.videoHeight;
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext("2d");
        ctx.save();
        ctx.translate(width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, width, height);
        ctx.restore();
        var dataUrl = canvas.toDataURL("image/png");
        setPhoto(dataUrl, width, height);
        setStatus(tr("photobooth.photoCaptured", "Photo captured"));
      }

      startButton.addEventListener("click", startCamera);
      captureButton.addEventListener("click", capturePhoto);
      retakeButton.addEventListener("click", function () {
        clearPhoto();
        showPreview();
        setStatus(stream
          ? tr("photobooth.cameraReady", "Camera ready")
          : tr("photobooth.statusReady", "Ready"));
      });
      downloadLink.addEventListener("click", function (event) {
        if (downloadLink.getAttribute("aria-disabled") === "true") {
          event.preventDefault();
        }
      });
      window.addEventListener("pagehide", stopStream);
      window.addEventListener("pagehide", revokePhotoBlob);

      localize();
      // The host pushes the locale bundle shortly after load; re-localize when
      // it arrives and on any later language change.
      if (window.terrane && typeof window.terrane.onMessages === "function") {
        window.terrane.onMessages(localize);
      }
    </script>
  </body>
</html>
