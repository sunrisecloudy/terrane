name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  platform-contracts:
    name: Platform Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Repository checks
        run: node --no-warnings tools/check-repo.mjs

      - name: Zig core tests
        working-directory: zig-core
        run: zig build test

      - name: Zig server tests
        working-directory: server
        run: zig build test

      - name: Fake host tests
        working-directory: tools/fake-platform-host
        run: npm test

      - name: Fake host performance smoke
        run: node --no-warnings tests/performance/fake-host-latency.mjs --warmup 5 --samples 20 --out performance_runs --enforce-targets

      - name: Upload fake host performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fake-host-performance-runs
          path: performance_runs/

      - name: Codex MCP tests
        working-directory: tools/codex-platform-mcp
        run: npm test

      - name: Codex MCP tool contract
        working-directory: tools/codex-platform-mcp
        run: npm run build

      - name: Package static release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts

      - name: Upload static release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-release-artifacts
          path: artifacts/

  zig-core-release-artifacts:
    name: Zig Core Release Artifacts
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Package Zig core release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-zig-core

      - name: Upload Zig core release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-core-release-artifacts
          path: artifacts/

  server-release-artifacts:
    name: Server Release Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install server build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Package server release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-server

      - name: Upload server release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-release-artifacts
          path: artifacts/

  linux-native-smoke:
    name: Linux Native Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            libgtk-4-dev \
            libjson-glib-dev \
            libsoup-3.0-dev \
            libsqlite3-dev \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            pkg-config \
            xvfb

      - name: Linux native launch smoke
        env:
          GSETTINGS_BACKEND: memory
          NATIVE_AI_LINUX_SMOKE_LAUNCH: "1"
          NO_AT_BRIDGE: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        run: node --test --no-warnings tools/fake-platform-host/test/linux-native-build.test.js

  macos-native-smoke:
    name: macOS Native Smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: macOS native launch smoke
        env:
          NATIVE_AI_MACOS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/fake-platform-host/test/macos-native-build.test.js

  ios-simulator-smoke:
    name: iOS Simulator Smoke
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: iOS simulator launch smoke
        env:
          NATIVE_AI_IOS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/fake-platform-host/test/ios-native-build.test.js

  android-emulator-smoke:
    name: Android Emulator Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Android emulator launch smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: NATIVE_AI_ANDROID_SMOKE_LAUNCH=1 node --test --no-warnings tools/fake-platform-host/test/android-native-build.test.js

  windows-native-smoke:
    name: Windows Native Smoke
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          $version = "1.0.2592.51"
          $packageRoot = Join-Path $env:RUNNER_TEMP "webview2"
          $archive = Join-Path $env:RUNNER_TEMP "Microsoft.Web.WebView2.$version.zip"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version" -OutFile $archive
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Expand-Archive -Path $archive -DestinationPath $packageRoot
          "NATIVE_AI_WEBVIEW2_NUGET_DIR=$packageRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Windows native launch smoke
        env:
          NATIVE_AI_WINDOWS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/fake-platform-host/test/windows-native-build.test.js
