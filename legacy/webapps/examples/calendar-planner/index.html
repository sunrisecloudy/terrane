<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Calendar Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Local planner</p>
        <h1 data-testid="calendar-planner-title">Calendar Planner</h1>
      </div>
      <div class="month-controls" aria-label="Month navigation">
        <button id="prev-month" data-testid="calendar-prev-month-button" type="button" aria-label="Previous month">Prev</button>
        <button id="today" data-testid="calendar-today-button" type="button">Today</button>
        <button id="next-month" data-testid="calendar-next-month-button" type="button" aria-label="Next month">Next</button>
      </div>
    </header>

    <section class="layout">
      <section class="panel calendar-panel" aria-labelledby="month-label">
        <div class="calendar-head">
          <h2 id="month-label" data-testid="calendar-month-label">Month</h2>
          <p id="month-summary" class="summary" data-testid="calendar-month-summary">0 events</p>
        </div>
        <div class="weekdays" aria-hidden="true">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="month-grid" class="month-grid" data-testid="calendar-month-grid"></div>
      </section>

      <aside class="panel agenda-panel" aria-labelledby="agenda-title">
        <h2 id="agenda-title">Agenda</h2>
        <p id="selected-date-label" class="summary" data-testid="calendar-selected-date">Select a date</p>
        <ol id="agenda-list" class="agenda-list" data-testid="calendar-agenda-list"></ol>
        <div id="agenda-empty" class="empty">No events for this date.</div>
      </aside>
    </section>

    <section class="panel composer" aria-labelledby="composer-title">
      <h2 id="composer-title">Add Event</h2>
      <div class="form-grid">
        <label>
          Title
          <input id="event-title" data-testid="calendar-event-title-input" maxlength="120" autocomplete="off" placeholder="Design review">
        </label>
        <label>
          Date
          <input id="event-date" data-testid="calendar-event-date-input" type="date">
        </label>
        <label>
          Start
          <input id="event-start" data-testid="calendar-event-start-input" type="time" value="09:00">
        </label>
        <label>
          Duration
          <select id="event-duration" data-testid="calendar-event-duration-input">
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60" selected>60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
          </select>
        </label>
      </div>
      <label>
        Notes
        <textarea id="event-notes" data-testid="calendar-event-notes-input" rows="3" maxlength="280" placeholder="Agenda, owner, or room"></textarea>
      </label>
      <div class="actions">
        <button id="add-event" data-testid="add-calendar-event-button" class="primary" type="button">Add event</button>
        <output id="core-output" data-testid="calendar-core-output">Waiting for event</output>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
