      <path d="M254 454 L440 600 L440 768 L254 616 Z" fill="url(#leftFace)"/>
      <path d="M440 600 L801 430 L801 592 L440 768 Z" fill="url(#rightFace)"/>
      <path d="M254 616 L440 768 L801 592 L801 642 L440 821 L254 670 Z" fill="url(#frontFace)"/>

      <path d="M254 454 L440 600 L801 430" fill="none" stroke="url(#rim)" stroke-width="11" stroke-linejoin="round"/>
      <path d="M254 454 L620 286 L801 430 L440 600 Z" fill="none" stroke="#f0d78d" stroke-opacity="0.1" stroke-width="4" stroke-linejoin="round"/>

      <g clip-path="url(#frontClip)" opacity="0.88">
        <path d="M272 515 C354 568 392 575 456 557 C548 530 619 466 782 462" fill="none" stroke="#e6b464" stroke-width="18" stroke-linecap="round" opacity="0.58"/>
        <path d="M266 565 C356 617 411 629 490 598 C580 563 664 514 803 508" fill="none" stroke="#342723" stroke-width="19" stroke-linecap="round" opacity="0.58"/>
        <path d="M260 612 C338 669 414 692 502 650 C593 607 682 571 804 566" fill="none" stroke="#c56e41" stroke-width="18" stroke-linecap="round" opacity="0.62"/>
        <path d="M296 680 C386 717 470 727 554 682 C642 635 706 625 813 616" fill="none" stroke="#e4a953" stroke-width="13" stroke-linecap="round" opacity="0.54"/>
      </g>

      <path d="M336 436 C401 397 461 399 517 434 C571 468 620 469 692 428"
            fill="none" stroke="#132220" stroke-width="28" stroke-linecap="round" opacity="0.42"/>
      <path d="M336 436 C401 397 461 399 517 434 C571 468 620 469 692 428"
            fill="none" stroke="url(#channel)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" opacity="0.98"/>

      <ellipse cx="620" cy="385" rx="58" ry="27" fill="#1d332e" opacity="0.42"/>
      <ellipse cx="619" cy="380" rx="39" ry="17" fill="#8aa26b" opacity="0.46"/>
      <path d="M425 350 C471 329 519 327 559 345" fill="none" stroke="#d9c879" stroke-width="10" stroke-linecap="round" opacity="0.22"/>
      <path d="M348 474 C383 503 417 513 454 508" fill="none" stroke="#15241f" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    </g>

    <rect x="66" y="66" width="892" height="892" rx="212" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>
