  <rect width="1024" height="1024" fill="#0f1718"/>
  <g clip-path="url(#iconMask)">
    <rect x="64" y="64" width="896" height="896" rx="214" fill="url(#bg)"/>
    <rect x="64" y="64" width="896" height="896" rx="214" fill="url(#bgGlow)"/>

    <circle cx="250" cy="250" r="214" fill="#89a66f" opacity="0.06"/>
    <circle cx="833" cy="809" r="256" fill="#bd7042" opacity="0.08"/>

    <g filter="url(#softShadow)">
