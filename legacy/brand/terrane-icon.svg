<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Terrane app icon">
  <defs>
    <linearGradient id="bg" x1="120" y1="64" x2="904" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#233630"/>
      <stop offset="0.46" stop-color="#172522"/>
      <stop offset="1" stop-color="#0f1718"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="43%" cy="30%" r="66%" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5e8067" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#31443b" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f1718" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="topSoil" x1="274" y1="282" x2="761" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#95a46e"/>
      <stop offset="0.44" stop-color="#617c55"/>
      <stop offset="1" stop-color="#304f43"/>
    </linearGradient>

    <linearGradient id="leftFace" x1="258" y1="401" x2="472" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c4b35"/>
      <stop offset="0.44" stop-color="#a4633c"/>
      <stop offset="1" stop-color="#4b2e29"/>
    </linearGradient>

    <linearGradient id="rightFace" x1="462" y1="573" x2="808" y2="433" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5d382d"/>
      <stop offset="0.5" stop-color="#8d5536"/>
      <stop offset="1" stop-color="#b1753e"/>
    </linearGradient>

    <linearGradient id="frontFace" x1="324" y1="603" x2="733" y2="738" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c2f2c"/>
      <stop offset="0.36" stop-color="#4b3129"/>
      <stop offset="0.7" stop-color="#915738"/>
      <stop offset="1" stop-color="#382b29"/>
    </linearGradient>

    <linearGradient id="rim" x1="318" y1="320" x2="720" y2="542" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d3c181" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#1f352f" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="channel" x1="344" y1="424" x2="676" y2="431" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9bbf84" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#8ee0d8"/>
      <stop offset="1" stop-color="#9bbf84" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
