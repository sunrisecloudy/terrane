name: CI

on:
  workflow_dispatch:

jobs:
  platform-contracts:
    name: Platform Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Repository checks
        run: node --no-warnings tools/check-repo.mjs

      - name: Forge workspace tests
        working-directory: forge
        run: cargo test --workspace --locked

      - name: Forge workspace clippy
        working-directory: forge
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Forge replay demo
        working-directory: forge
        run: cargo run -p forge-cli -- demo

      - name: Reference host tests
        working-directory: tools/reference-host
        run: npm test

      - name: Reference host performance smoke
        run: node --no-warnings tests/performance/reference-host-latency.mjs --warmup 5 --samples 20 --out performance_runs --enforce-targets

      - name: Upload reference host performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reference-host-performance-runs
          path: performance_runs/

      - name: Codex MCP tests
        working-directory: tools/codex-platform-mcp
        run: npm test

      - name: Codex MCP tool contract
        working-directory: tools/codex-platform-mcp
        run: npm run build

      - name: Package static release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts

      - name: Upload static release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-release-artifacts
          path: artifacts/

  forge-ffi-release-artifacts:
    name: Forge FFI Release Artifacts
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Package Forge FFI release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-forge-ffi

      - name: Upload Forge FFI release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-ffi-release-artifacts
          path: artifacts/

  server-release-artifacts:
    name: Server Release Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install server build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Package server release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-forge-server

      - name: Upload server release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-release-artifacts
          path: artifacts/

  macos-native-release-artifacts:
    name: macOS Native Release Artifacts
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Package macOS native release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-native-macos

      - name: Upload macOS native release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-native-release-artifacts
          path: artifacts/

  linux-native-release-artifacts:
    name: Linux Native Release Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libc6-dev \
            libgtk-4-dev \
            libjson-glib-dev \
            libsoup-3.0-dev \
            libsqlite3-dev \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            pkg-config

      - name: Package Linux native release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-native-linux

      - name: Upload Linux native release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-native-release-artifacts
          path: artifacts/

  windows-native-release-artifacts:
    name: Windows Native Release Artifacts
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          $version = "1.0.2592.51"
          $packageRoot = Join-Path $env:RUNNER_TEMP "webview2"
          $archive = Join-Path $env:RUNNER_TEMP "Microsoft.Web.WebView2.$version.zip"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version" -OutFile $archive
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Expand-Archive -Path $archive -DestinationPath $packageRoot
          "TERRANE_WEBVIEW2_NUGET_DIR=$packageRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package Windows native release artifacts
        run: node --no-warnings tools/package-release.mjs --out artifacts --build-native-windows

      - name: Upload Windows native release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-release-artifacts
          path: artifacts/

  linux-native-smoke:
    name: Linux Native Smoke (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Docker-backed Linux native launch smoke
        run: node --no-warnings tools/run-linux-native-docker.mjs

  macos-native-smoke:
    name: macOS Native Smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: macOS native launch smoke
        env:
          TERRANE_MACOS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/reference-host/test/macos-native-build.test.js

  ios-simulator-smoke:
    name: iOS Simulator Smoke
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: iOS simulator launch smoke
        env:
          TERRANE_IOS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/reference-host/test/ios-native-build.test.js

  android-emulator-smoke:
    name: Android Emulator Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Android emulator launch smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: TERRANE_ANDROID_SMOKE_LAUNCH=1 node --test --no-warnings tools/reference-host/test/android-native-build.test.js

  windows-native-smoke:
    name: Windows Native Smoke
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          $version = "1.0.2592.51"
          $packageRoot = Join-Path $env:RUNNER_TEMP "webview2"
          $archive = Join-Path $env:RUNNER_TEMP "Microsoft.Web.WebView2.$version.zip"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version" -OutFile $archive
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Expand-Archive -Path $archive -DestinationPath $packageRoot
          "TERRANE_WEBVIEW2_NUGET_DIR=$packageRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Windows native launch smoke
        env:
          TERRANE_WINDOWS_SMOKE_LAUNCH: "1"
        run: node --test --no-warnings tools/reference-host/test/windows-native-build.test.js
