[package]
name = "terrane-local-llm"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "terrane_local_llm"
path = "src/lib.rs"

[dependencies]
encoding_rs = "0.8"
llama-cpp-2 = { workspace = true, features = ["llguidance"] }
serde = { workspace = true }
serde_json = { workspace = true }
ureq = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
llama-cpp-2 = { workspace = true, features = ["llguidance", "metal"] }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
