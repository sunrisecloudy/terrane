[package]
name = "terrane-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "terrane_core"
path = "src/lib.rs"

[features]
default = []
sqlite-storage = ["terrane-cap-kv/sqlite-storage"]
rocksdb-storage = ["terrane-cap-kv/rocksdb-storage"]

[dependencies]
terrane-cap-interface.workspace = true
terrane-cap-app.workspace = true
terrane-cap-build.workspace = true
terrane-cap-builder.workspace = true
terrane-cap-crdt.workspace = true
terrane-cap-harness.workspace = true
terrane-cap-kv.workspace = true
terrane-cap-model.workspace = true
terrane-cap-net.workspace = true
terrane-cap-replica.workspace = true
borsh.workspace = true
nanoserde.workspace = true
rquickjs = { version = "0.12", features = ["macro"] }

[dev-dependencies]
tempfile.workspace = true
loro = "1.13.6"
