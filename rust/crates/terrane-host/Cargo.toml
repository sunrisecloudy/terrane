[package]
name = "terrane-host"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "terrane_host"
path = "src/lib.rs"
crate-type = ["rlib", "staticlib", "cdylib"]

[features]
default = ["local-llm"]
local-llm = ["dep:terrane-local-llm"]
asr-engine = ["dep:terrane-asr", "terrane-asr/whisper", "local-llm"]
rocksdb-storage = [
  "terrane-core/rocksdb-storage",
  "terrane-cap-kv/rocksdb-storage",
  "dep:rocksdb",
]

[[bin]]
name = "terrane"
path = "src/bin/terrane.rs"

[dependencies]
getrandom = "0.4.3"
hound.workspace = true
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp"] }
nanoserde = { workspace = true }
# Hidden terminal input for `run … --ask`, so a master password never lands on
# argv. Reads a line from stdin: no echo on a TTY, plain when piped.
rpassword = "7"
rusqlite.workspace = true
serde_json = "1"
keyring.workspace = true
# Edge HTTP(S) GET for the `net` effect (http:// and https://, TLS via rustls).
ureq = { workspace = true }
sysinfo = "0.33"
terrane-api.workspace = true
terrane-app-build.workspace = true
terrane-cap-app.workspace = true
terrane-cap-auth.workspace = true
terrane-cap-blob.workspace = true
terrane-cap-browser.workspace = true
terrane-cap-builder.workspace = true
terrane-cap-crdt.workspace = true
terrane-cap-connection.workspace = true
terrane-cap-crypto.workspace = true
terrane-cap-document.workspace = true
terrane-cap-geo.workspace = true
terrane-cap-harness.workspace = true
terrane-cap-history.workspace = true
terrane-cap-interface.workspace = true
terrane-cap-interop.workspace = true
terrane-cap-js-runtime.workspace = true
terrane-cap-kv.workspace = true
terrane-cap-local-model.workspace = true
terrane-cap-media.workspace = true
terrane-cap-model.workspace = true
terrane-cap-native.workspace = true
terrane-cap-net.workspace = true
terrane-cap-replica.workspace = true
terrane-cap-scheduler.workspace = true
terrane-cap-telemetry.workspace = true
terrane-cap-time.workspace = true
terrane-cap-wasm-runtime.workspace = true
terrane-core.workspace = true
terrane-i18n.workspace = true
terrane-local-llm = { workspace = true, optional = true }
terrane-asr = { workspace = true, optional = true }
base64 = "0.22"
sha2 = "0.10"
symphonia = { version = "0.5", default-features = false, features = ["aac", "flac", "mp3", "isomp4", "ogg", "pcm", "vorbis", "wav"] }
tempfile.workspace = true

[target.'cfg(unix)'.dependencies]
libc = "0.2"
rocksdb = { workspace = true, optional = true }

[dev-dependencies]
