[package]
name = "terrane-host"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "terrane_host"
path = "src/lib.rs"
crate-type = ["rlib", "staticlib", "cdylib"]

[[bin]]
name = "terrane"
path = "src/bin/terrane.rs"

[dependencies]
getrandom = "0.4.3"
nanoserde = { workspace = true }
serde_json = "1"
terrane-api = { path = "../terrane-api" }
terrane-app-build.workspace = true
terrane-cap-app.workspace = true
terrane-cap-builder.workspace = true
terrane-cap-crdt.workspace = true
terrane-cap-harness.workspace = true
terrane-cap-kv.workspace = true
terrane-cap-model.workspace = true
terrane-cap-net.workspace = true
terrane-cap-replica.workspace = true
terrane-core.workspace = true

[dev-dependencies]
rocksdb.workspace = true
rusqlite.workspace = true
tempfile.workspace = true
